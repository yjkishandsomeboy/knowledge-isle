name: knowledge-isle

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-knowledge_isle}
      POSTGRES_USER: ${POSTGRES_USER:-knowledge_isle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-knowledge_isle_dev}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-knowledge_isle} -d ${POSTGRES_DB:-knowledge_isle}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-knowledge_isle}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-knowledge_isle_dev_password}
    ports:
      - "127.0.0.1:${MINIO_API_HOST_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  worker:
    image: python:3.12-slim
    working_dir: /app
    command: >-
      sh -c "pip install --no-cache-dir uv && uv run --package knowledge-isle-worker
      celery -A knowledge_isle_worker.celery_app worker --loglevel=INFO"
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/apps/api/src:/app/apps/worker/src
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-knowledge_isle}:${POSTGRES_PASSWORD:-knowledge_isle_dev}@postgres:5432/${POSTGRES_DB:-knowledge_isle}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
